# Project information
site_name: Dirección Financiera - MBA
site_url: https://fdiaz1968.github.io/Finance-MBA/
site_author: Fernando Díaz H., PhD.
site_description: Dirección Financiera (MGE 308) — Riesgo, Portafolio y Valoración de Activos · MBA UTFSM

# Repository
repo_name: fdiaz1968/Finance-MBA
repo_url: https://github.com/fdiaz1968/Finance-MBA
edit_uri: ''

# Markdown extensions
markdown_extensions:
  - attr_list
  - admonition
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.tabbed

# Extra javascript
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Theme
theme:
  name: material
  language: es
  logo: images/logo_utfsm.png
  favicon: images/logo_utfsm.png
  features:
    - navigation.instant
    - navigation.top
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    # Light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode

    # Dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

# Customization
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fdiaz1968
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/frdiazh/
    - icon: fontawesome/solid/globe
      link: https://fdiaz1968.github.io/portfolio/

# Plugins
plugins:
  - mkdocs-jupyter:
      kernel_name: python3
  - search

# TOC
nav:
    - Home: index.md
    - Programa: programa.md
    - Clases:
        - "Módulo 3 — Riesgo y Diversificación": clases/clases.md
    - Controles y Trabajos: exercises/exercises.md
    - Datasets: datasets/datasets.md
    - Evaluaciones:
        - "📊 Proyecto Integrador": assessments/proyecto_integrador.md

